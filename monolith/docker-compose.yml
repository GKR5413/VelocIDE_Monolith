services:
  velocide-monolith:
    build:
      context: ..
      dockerfile: monolith/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - monolith_workspace:/workspace
    restart: unless-stopped

volumes:
  monolith_workspace:
